name: test
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check siam_vqe
      - name: Mypy
        run: mypy siam_vqe
      - name: Pytest
        run: pytest --cov=siam_vqe --cov-report=term-missing
